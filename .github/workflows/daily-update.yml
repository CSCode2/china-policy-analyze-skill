name: Daily Policy Update

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  daily-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install uv
          uv venv venv
          source venv/bin/activate
          uv pip install -e "."
      - name: Run daily update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          source venv/bin/activate
          bash scripts/run_daily_update.sh
      - name: Create PR if changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            BRANCH="bot/policy-update-$(date +%Y%m%d)"
            git checkout -b "$BRANCH"
            git add -A
            git commit -m "Daily policy update $(date +%Y-%m-%d)"
            git push origin "$BRANCH"
            gh pr create --title "Daily Policy Update $(date +%Y-%m-%d)" --body-file config/github_pr_template.md
          fi
