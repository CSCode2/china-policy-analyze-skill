name: PR Quality Gate

on:
  pull_request:
    branches: [main]

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install uv
          uv venv venv
          source venv/bin/activate
          uv pip install -e ".[dev]"
      - name: Lint
        run: |
          source venv/bin/activate
          ruff check src/ tests/
      - name: Run tests
        run: |
          source venv/bin/activate
          pytest tests/ -v --tb=short
      - name: Citation check
        run: |
          source venv/bin/activate
          python -m china_policy_skill.evaluate.run_eval --check citations
      - name: Safety check
        run: |
          source venv/bin/activate
          python -m china_policy_skill.evaluate.run_eval --check safety
