# 预测校准测试 / Forecast Calibration Tests
# 规范章节 32 — 月度校准评估
# 用于评估系统情景分析的准确性和校准度

calibration_tests:
  - id: calibration_001
    name: "情景覆盖率校准"
    description: |
      评估系统情景分析是否覆盖了实际发生的政策走向。
      如果实际结果不在任何预设情景中，说明情景覆盖不足。
    evaluation_method: |
      1. 回溯 90 天前的情景分析输出
      2. 检查实际政策走向是否被预设情景覆盖
      3. 计算覆盖率 = 被覆盖的实际结果数 / 总实际结果数
    target: "覆盖率 ≥ 80%"
    frequency: "每月一次"

  - id: calibration_002
    name: "基线情景命中率校准"
    description: |
      评估基线情景（最可能情景）的预测准确性。
      基线情景命中意味着实际结果落在基线情景范围内。
    evaluation_method: |
      1. 回溯 90 天前的基线情景
      2. 对比实际政策走向与基线情景
      3. 计算命中率 = 基线命中次数 / 总评估次数
    target: "命中率 ≥ 50%（不应过高，过高说明情景区分度不足）"
    frequency: "每月一次"

  - id: calibration_003
    name: "乐观/悲观情景校准"
    description: |
      评估乐观和悲观情景的实际发生率是否符合概率预期。
      如果基线情景概率为 50%，乐观为 25%，悲观为 25%，
      那么长期来看实际分布应接近此概率分配。
    evaluation_method: |
      1. 统计过去 N 次情景分析的概率分配
      2. 统计实际结果落入各情景的频率分布
      3. 计算校准误差 = 预期概率 - 实际频率
    target: "各情景校准误差 ≤ 15%"
    frequency: "每月一次"

  - id: calibration_004
    name: "信号检测灵敏度校准"
    description: |
      评估系统对政策信号变化的检测灵敏度。
      信号灵敏度 = 正确识别的信号数 / 实际发生的信号数
    evaluation_method: |
      1. 记录系统在过去 30 天内识别的所有政策信号
      2. 与实际政策变化事件对比
      3. 计算灵敏度（真阳性率）和误报率（假阳性率）
    target: "灵敏度 ≥ 70%，误报率 ≤ 30%"
    frequency: "每月一次"

  - id: calibration_005
    name: "时效性校准"
    description: |
      评估系统从政策发布到输出分析的时间延迟。
      时效性 = 首次输出时间 - 政策发布时间
    evaluation_method: |
      1. 抽取过去 30 天内的政策分析输出
      2. 查找对应政策原文的发布时间
      3. 计算时间延迟
    target: "中位延迟 ≤ 24 小时，95 分位延迟 ≤ 72 小时"
    frequency: "每月一次"

  - id: calibration_006
    name: "来源质量校准"
    description: |
      评估引用来源的实际有效性。
      来源质量 = 可验证的来源数 / 总引用来源数
    evaluation_method: |
      1. 抽取过去 30 天内输出中引用的所有来源
      2. 验证每个来源的可访问性和内容一致性
      3. 计算来源有效率
    target: "来源有效率 ≥ 95%"
    frequency: "每月一次"

  - id: calibration_007
    name: "证据等级准确性校准"
    description: |
      评估证据等级标注的准确性。
      抽样检查标注为 L1 的内容是否确实来自政策原文，
      标注为 L3 的内容是否确实有多家权威媒体一致报道。
    evaluation_method: |
      1. 随机抽取 20 条引用标注
      2. 人工验证证据等级标注是否准确
      3. 计算准确率
    target: "证据等级准确率 ≥ 90%"
    frequency: "每月一次"

  - id: calibration_008
    name: "敏感内容过滤校准"
    description: |
      评估敏感内容过滤的精确率和召回率。
      精确率 = 正确过滤数 / 总过滤数
      召回率 = 正确过滤数 / 应过滤总数
    evaluation_method: |
      1. 使用包含敏感和正常内容的测试集
      2. 运行系统过滤
      3. 计算精确率和召回率
    target: "精确率 ≥ 95%，召回率 ≥ 99%（对禁止内容宁漏勿纵）"
    frequency: "每月一次"

  - id: calibration_009
    name: "跨版本一致性校准"
    description: |
      评估同一问题在不同时间的回答一致性。
      对于政策未发生变化的问题，两次回答的核心结论应一致。
    evaluation_method: |
      1. 选择 10 个政策未变化的测试问题
      2. 在不同时间分别运行
      3. 比较核心结论的一致性
    target: "核心结论一致率 ≥ 90%"
    frequency: "每月一次"

  - id: calibration_010
    name: "用户满意度校准"
    description: |
      通过用户反馈评估系统输出的实用性。
      用户满意度 = 正面反馈数 / 总反馈数
    evaluation_method: |
      1. 收集用户对分析输出的反馈
      2. 分类为正面/中性/负面
      3. 计算满意度比例
    target: "满意度 ≥ 70%（初期目标，逐步提高）"
    frequency: "每月一次"

reporting:
  format: |
    ## 月度校准报告 - YYYY年MM月

    ### 总体评分
    - 综合 calibration score: X/10
    - 较上月变化: +/-X

    ### 各项指标
    | 测试项 | 目标 | 实际 | 达标 |
    |--------|------|------|------|
    | ...    | ...  | ...  | ...  |

    ### 问题和改进建议
    - ...

    ### 行动项
    - [ ] ...
  retention: "保留最近 12 个月的校准报告"
  escalation: "如连续 2 个月综合评分低于 6/10，触发专项改进计划"
