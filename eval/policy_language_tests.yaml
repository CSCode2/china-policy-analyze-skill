# 政策语言解读测试 / Policy Language Interpretation Tests
# 规范章节 33.8 — 政策语言解读准确性与审慎性测试
# 共 10 项测试

tests:
  - id: policy_lang_001
    name: "模糊表述不得过度解读"
    description: |
      政策文本中的模糊表述（如"积极探索""研究推进""适时出台"）不得被解读为确定性承诺。
      系统应正确识别模糊表述，并将其解读为不确定信号而非确定行动。
    input_query: "研究推进数字人民币跨境支付的政策意图是什么？"
    expected_behavior:
      - 必须识别"研究推进"为模糊表述
      - 不得将"研究推进"解读为"即将推出"或"确定实施"
      - 须标注该表述的证据等级上限为 E1（原文），但解读确定性不超过 E4
      - 须说明"研究推进"与"推进实施"的政策信号强度差异

  - id: policy_lang_002
    name: "支持性表述与强制要求的区分"
    description: |
      "鼓励""支持""引导"为支持性表述，"应当""必须""一律"为强制性要求。
      系统须准确区分，不得混淆政策力度等级。
    input_query: "政策规定'鼓励企业开展绿色转型'，企业是否必须执行？"
    expected_behavior:
      - 明确区分"鼓励"（支持性）与"应当/必须"（强制性）
      - 不得将支持性表述解读为强制要求
      - 须说明不执行支持性政策无法律后果
      - 须指出可能存在的配套激励措施

  - id: policy_lang_003
    name: "试点与全面推广的区分"
    description: |
      "试点""试行""示范"为局部性措施，"全面推行""在全国范围内实施"为全面性措施。
      系统不得将试点政策解读为已全面推广。
    input_query: "跨境电商综合试验区试点政策对企业有什么机会？"
    expected_behavior:
      - 明确标注该政策为试点/示范性质
      - 限定适用范围为试点区域
      - 不得将试点效果推断为全国效果
      - 须说明试点与全面推广之间的不确定时间差

  - id: policy_lang_004
    name: "条件性表述的限定识别"
    description: |
      政策中的条件性表述（"在……条件下""经……批准""符合条件的"）构成政策适用的前提条件。
      系统不得忽略条件限定而泛化政策适用范围。
    input_query: "符合条件的中小企业可以享受税收优惠，具体是什么条件？"
    expected_behavior:
      - 必须完整列出适用条件
      - 不得忽略条件限定而泛化优惠范围
      - 须说明不满足条件的后果（不适用该政策）
      - 须标注条件条款的原文出处

  - id: policy_lang_005
    name: "时间性表述的准确解读"
    description: |
      "尽快""尽早""稳步""有序"等时间性表述具有不同程度的不确定性，
      系统不得将其解读为明确的时间节点。
    input_query: "文件要求'尽快完善相关配套制度'，什么时候会出台？"
    expected_behavior:
      - 识别"尽快"为不确定时间表述
      - 不得给出具体时间预测
      - 须说明"尽快"不构成法定期限约束
      - 可参考类似政策的历史落地时间作为参考区间（标注不确定性）

  - id: policy_lang_006
    name: "否定性表述的正确理解"
    description: |
      "不得""禁止""严禁"为绝对禁止，"一般不""原则上不""尽量不"为有例外的限制。
      系统须准确区分否定程度。
    input_query: "原则上不得新建高耗能项目，是否还有可能获批？"
    expected_behavior:
      - 区分"原则上不得"与"不得/禁止"的否定程度
      - 说明"原则上不得"存在例外可能
      - 须指出例外通常需要的审批条件和程序
      - 不得将"原则上不得"等同于绝对禁止

  - id: policy_lang_007
    name: "并列与递进关系的准确识别"
    description: |
      "和""与""及"为并列关系，"进一步""深化""升级"为递进关系。
      系统须准确识别逻辑关系，不得将递进要求降低为并列维持。
    input_query: "文件提出'完善并进一步深化国有企业改革'，当前重点是什么？"
    expected_behavior:
      - 识别"完善"与"进一步深化"为递进关系
      - 不得将递进要求简化为维持现状
      - 须说明"进一步深化"意味着超越当前水平的要求
      - 须区分"完善"（修补优化）与"深化"（向纵深推进）的政策信号差异

  - id: policy_lang_008
    name: "政策引用的层级关系"
    description: |
      "根据……规定""依据……精神""按照……要求"表示层级引用关系，
      系统须追溯到原始政策并说明层级关系。
    input_query: "该通知'根据《国务院关于……的若干意见》精神'制定，与原文有什么关系？"
    expected_behavior:
      - 须追溯到被引用的原始政策文件
      - 须说明当前文件与原始文件的层级关系（实施细则/配套措施等）
      - 如原始文件已修订，须标注并说明影响
      - 不得仅引用当前文件而忽略上位法依据

  - id: policy_lang_009
    name: "数量表述的精确性"
    description: |
      政策中的数量表述（"大幅""显著""适当""一定比例"）具有模糊性，
      系统不得将其解读为精确数值或目标。
    input_query: "政策提出'大幅增加研发投入'，增幅大概多少？"
    expected_behavior:
      - 识别"大幅"为模糊数量表述，无精确数值
      - 不得编造或推测具体数值
      - 可参考同领域政策中的量化目标作为参考（标注为参考而非政策规定）
      - 须提醒用户以官方后续发布的量化指标为准

  - id: policy_lang_010
    name: "政策用语变化检测"
    description: |
      同一政策领域在不同时期的用语变化（如"允许"→"鼓励"→"支持"→"大力推进"）
      反映政策信号强度的变化，系统须识别并标注。
    input_query: "对比去年和今年政府工作报告中关于 AI 的表述变化"
    expected_behavior:
      - 须逐字对比关键用语的差异
      - 须标注用语变化的信号强度方向（增强/减弱/持平）
      - 不得过度解读用语变化的含义
      - 须提醒用语变化不等于政策实质变化的确定性结论
      - 须引用两个时期的具体原文
